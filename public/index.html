<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Darkroom Log</title>
<link rel="icon" type="image/png" href="/favicon.png"><link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --safe: #c8611a;
    --safe-dim: #7a3a0e;
    --safe-glow: rgba(200, 97, 26, 0.15);
    --text: #e8e0d8;
    --text-dim: #6b6560;
    --text-mid: #a09890;
    --red: #d64040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; min-height: 100vh; line-height: 1.5; }
  .container { max-width: 720px; margin: 0 auto; }
  #login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .login-box { width: 100%; max-width: 320px; }
  .login-title { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--safe); margin-bottom: 2rem; text-align: center; }
  .login-title span { display: block; font-size: 22px; letter-spacing: 0.05em; color: var(--text); margin-top: 0.5rem; font-weight: 300; }
  input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1rem; font-family: 'IBM Plex Mono', monospace; font-size: 13px; outline: none; border-radius: 0; -webkit-appearance: none; transition: border-color 0.2s; }
  input:focus, select:focus, textarea:focus { border-color: var(--safe); }
  textarea { resize: vertical; min-height: 80px; }
  .btn { display: block; width: 100%; padding: 0.85rem 1.5rem; background: var(--safe); color: #fff; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #d97020; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-mid); }
  .btn-ghost:hover { border-color: var(--safe); color: var(--safe); background: transparent; }
  .btn-danger { background: var(--red); }
  .btn-danger:hover { background: #b83030; }
  .btn-sm { padding: 0.5rem 1rem; font-size: 11px; width: auto; display: inline-block; }
  .btn-icon { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; padding: 0 0.25rem; line-height: 1; }
  .btn-icon:hover { color: var(--safe); }
  .form-group { margin-bottom: 1rem; }
  .form-label { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.4rem; }
  .error-msg { color: var(--red); font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-top: 0.5rem; text-align: center; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1rem; height: 52px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; }
  .header-inner { max-width: 720px; margin: 0 auto; width: 100%; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--safe); }
  .header-actions { display: flex; gap: 0.5rem; align-items: center; }
  .view { display: none; }
  .view.active { display: block; }
  .gallery-toolbar { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; max-width: 720px; margin: 0 auto; }
  .gallery-toolbar input { flex: 1; }
  .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border); max-width: 720px; margin: 0 auto; }
  @media (min-width: 600px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
  .gallery-item { background: var(--surface); cursor: pointer; position: relative; aspect-ratio: 1; overflow: hidden; }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: opacity 0.2s; }
  .gallery-item:hover img { opacity: 1; }
  .gallery-item-info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85)); padding: 1.5rem 0.75rem 0.75rem; }
  .gallery-item-title { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gallery-item-count { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--safe); margin-top: 2px; }
  .gallery-empty { padding: 3rem 1rem; text-align: center; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; font-size: 12px; grid-column: 1 / -1; }
  .detail-image { width: 100%; max-height: 50vh; object-fit: contain; background: #000; display: block; }
  .detail-meta { padding: 1rem; border-bottom: 1px solid var(--border); background: var(--surface); }
  .detail-title-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .detail-title { font-size: 24px; font-weight: 300; flex: 1; }
  .title-edit-input { font-size: 16px; font-weight: 300; flex: 1; padding: 0.2rem 0.5rem; }
  .detail-film { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-mid); margin-bottom: 0.5rem; }
  .exif-row { display: flex; gap: 1.5rem; font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--text-dim); flex-wrap: wrap; }
  .exif-item span { color: var(--text-mid); display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  .sessions-header { padding: 1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .sessions-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }
  .session-card { border-bottom: 1px solid var(--border); padding: 1rem; }
  .session-date { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--safe); letter-spacing: 0.1em; margin-bottom: 0.75rem; }
  .session-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
  .session-field-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 2px; }
  .session-field-value { font-family: 'IBM Plex Mono', monospace; font-size: 16px; color: var(--text); }
  .session-notes { font-size: 15px; color: var(--text-mid); font-style: italic; border-left: 2px solid var(--safe-dim); padding-left: 0.75rem; margin-top: 0.5rem; }
  .session-actions { margin-top: 0.75rem; display: flex; justify-content: flex-end; gap: 0.5rem; }
  .session-header-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
  .session-size { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-mid); }
  .session-exposure { font-family: 'IBM Plex Mono', monospace; font-size: 20px; color: var(--text); margin-bottom: 0.6rem; letter-spacing: 0.02em; }
  .session-details { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
  .session-tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); background: var(--surface2); border: 1px solid var(--border); padding: 0.2rem 0.5rem; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; overflow-y: auto; }
  .modal-overlay.active { display: block; }
  .modal { background: var(--surface); margin: 2rem 1rem; border: 1px solid var(--border); max-width: 500px; margin-left: auto; margin-right: auto; }
  .modal-header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--safe); }
  .modal-close { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; padding: 0; line-height: 1; }
  .modal-body { padding: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .section-divider { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--safe-dim); border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.5rem; margin-bottom: 1rem; }
  .search-results { background: var(--surface2); border: 1px solid var(--border); max-height: 250px; overflow-y: auto; }
  .search-result-item { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 11px; transition: background 0.15s; }
  .search-result-item:hover { background: var(--safe-glow); }
  .search-result-item.selected { background: var(--safe-glow); border-left: 2px solid var(--safe); }
  .nav-back { display: flex; align-items: center; gap: 0.5rem; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); cursor: pointer; background: none; border: none; padding: 0; }
  .nav-back:hover { color: var(--safe); }
  .loading { padding: 2rem; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .technique-toggle { display: flex; gap: 1px; margin-bottom: 1rem; }
  .technique-btn { flex: 1; padding: 0.6rem; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; font-size: 11px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .technique-btn.active { background: var(--safe-glow); border-color: var(--safe); color: var(--safe); }
  .split-grade-fields, .single-grade-fields { display: none; }
  .split-grade-fields.visible, .single-grade-fields.visible { display: block; }
  .detail-layout { display: block; }
  @media (min-width: 600px) {
    .detail-layout { display: grid; grid-template-columns: 3fr 2fr; min-height: calc(100vh - 52px); }
    .detail-left { position: sticky; top: 52px; height: calc(100vh - 52px); }
    .detail-image { width: 100%; height: 100%; max-height: none; object-fit: contain; object-position: top center; background: #000; }
    .detail-right { overflow-y: auto; border-left: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-title">JJ Lakatua<span>Darkroom Log</span></div>
    <div class="form-group">
      <input type="password" id="login-password" placeholder="Password" autofocus>
    </div>
    <button class="btn" onclick="login()">Enter</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-inner">
      <div style="display:flex;align-items:center;gap:1rem">
        <button class="nav-back" id="back-btn" onclick="showGallery()" style="display:none">← Back</button>
        <div class="header-title" id="header-title">Darkroom Log</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" id="add-print-btn" onclick="openAddPrintModal()">+ Print</button>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Out</button>
      </div>
    </div>
  </div>

  <div class="view active" id="gallery-view">
    <div class="gallery-toolbar">
      <input type="text" placeholder="Search prints..." id="gallery-search" oninput="filterGallery(this.value)">
    </div>
    <div class="gallery-grid" id="gallery-grid">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div class="view" id="detail-view">
    <div id="detail-content"></div>
  </div>
</div>

<!-- Add Print Modal -->
<div class="modal-overlay" id="add-print-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Print</div>
      <button class="modal-close" onclick="closeModal('add-print-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Search Negative (Immich)</label>
        <input type="text" id="immich-search" placeholder="Filename or keyword..." oninput="searchImmich(this.value)">
        <div id="immich-results" style="margin-top:0.5rem"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Print Title</label>
        <input type="text" id="print-title" placeholder="e.g. Gas Works">
      </div>
      <button class="btn" onclick="createPrint()" style="margin-top:0.5rem">Create Print Entry</button>
    </div>
  </div>
</div>

<!-- Add/Edit Session Modal -->
<div class="modal-overlay" id="add-session-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="session-modal-title">Log Print Session</div>
      <button class="modal-close" onclick="closeModal('add-session-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" id="s-date">
        </div>
        <div class="form-group">
          <label class="form-label">Print Size</label>
          <input type="text" id="s-size" placeholder="e.g. 9x6">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Enlarger</label>
          <input type="text" id="s-enlarger" placeholder="e.g. 7">
        </div>
        <div class="form-group">
          <label class="form-label">Lens</label>
          <input type="text" id="s-lens" placeholder="e.g. A4">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Paper</label>
        <select id="s-paper" onchange="handlePaperChange(this)">
          <option value="">Select paper...</option>
          <option value="Fomabrom Variant 111 Glossy">Fomabrom Variant 111 Glossy</option>
          <option value="Ilford Multigrade FB Classic Glossy">Ilford Multigrade FB Classic Glossy</option>
          <option value="Ilford Multigrade FB Warmtone Glossy">Ilford Multigrade FB Warmtone Glossy</option>
          <option value="Ilford Multigrade RC Deluxe">Ilford Multigrade RC Deluxe</option>
          <option value="__other__">Other...</option>
        </select>
        <input type="text" id="s-paper-other" placeholder="Enter paper name" style="display:none;margin-top:0.5rem">
      </div>
      <div class="section-divider">Exposure</div>
      <div class="form-group">
        <label class="form-label">Technique</label>
        <div class="technique-toggle">
          <div class="technique-btn active" onclick="setTechnique('single')" id="t-single">Single Grade</div>
          <div class="technique-btn" onclick="setTechnique('split')" id="t-split">Split Grade</div>
        </div>
      </div>
      <div class="single-grade-fields visible" id="single-fields">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">f/Stop</label>
            <input type="text" id="s-fstop" placeholder="8" oninput="autoPrefixF(this)">
          </div>
          <div class="form-group">
            <label class="form-label">Grade / Filter</label>
            <input type="text" id="s-grade" placeholder="1.5" oninput="autoPrefixHash(this)">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Time</label>
          <input type="text" id="s-time" placeholder="e.g. 35s">
        </div>
      </div>
      <div class="split-grade-fields" id="split-fields">
        <div class="form-group">
          <label class="form-label">f/Stop</label>
          <input type="text" id="s-fstop-split" placeholder="e.g. f/11">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Low Grade (highlights)</label>
            <input type="text" id="s-grade-low" placeholder="00" oninput="autoPrefixHash(this)">
          </div>
          <div class="form-group">
            <label class="form-label">Low Grade Time (s)</label>
            <input type="text" id="s-g00" placeholder="19">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">High Grade (shadows)</label>
            <input type="text" id="s-grade-high" placeholder="5" oninput="autoPrefixHash(this)">
          </div>
          <div class="form-group">
            <label class="form-label">High Grade Time (s)</label>
            <input type="text" id="s-g5" placeholder="6">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Dodge / Burn Notes</label>
        <textarea id="s-dodgeburn" placeholder="e.g. 8s dodge mountain shadow right 1/3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Additional Notes</label>
        <textarea id="s-notes" placeholder="Any other observations..."></textarea>
      </div>
      <button class="btn" onclick="saveSession()" style="margin-top:0.5rem">Save Session</button>
    </div>
  </div>
</div>

<script>
let state = {
  prints: [],
  currentPrintId: null,
  selectedImmich: null,
  technique: 'single',
  editingSessionId: null,
  immichSearchTimeout: null
};

async function login() {
  const pw = document.getElementById('login-password').value;
  const r = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password: pw}) });
  if (r.ok) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadGallery();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password';
  }
}

async function logout() { await fetch('/api/logout', {method:'POST'}); location.reload(); }
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

(async () => {
  const r = await fetch('/api/auth/check');
  const d = await r.json();
  if (d.authenticated) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadGallery();
  }
})();

async function loadGallery() {
  const r = await fetch('/api/prints');
  state.prints = await r.json();
  renderGallery(state.prints);
}

function renderGallery(prints) {
  const grid = document.getElementById('gallery-grid');
  if (!prints.length) { grid.innerHTML = '<div class="gallery-empty">No prints yet.<br>Tap + Print to add one.</div>'; return; }
  grid.innerHTML = prints.map(p => `
    <div class="gallery-item" onclick="showDetail('${p.id}')">
      <img src="/api/immich/thumb/${p.immichId}" alt="${p.title}" loading="lazy" onerror="this.style.background='#1a1a1a'">
      <div class="gallery-item-info">
        <div class="gallery-item-title">${p.title}</div>
        <div class="gallery-item-count">${p.sessions?.length || 0} session${(p.sessions?.length || 0) !== 1 ? 's' : ''}</div>
      </div>
    </div>
  `).join('');
}

function filterGallery(q) {
  renderGallery(state.prints.filter(p => p.title.toLowerCase().includes(q.toLowerCase()) || p.filename.toLowerCase().includes(q.toLowerCase())));
}

async function showDetail(printId) {
  const print = state.prints.find(p => p.id === printId);
  if (!print) return;
  state.currentPrintId = printId;
  document.getElementById('gallery-view').classList.remove('active');
  document.getElementById('detail-view').classList.add('active');
  document.getElementById('back-btn').style.display = 'flex';
  document.getElementById('add-print-btn').style.display = 'none';
  document.getElementById('header-title').textContent = print.title;

  const content = document.getElementById('detail-content');
  content.innerHTML = '<div class="loading">Loading...</div>';

  let meta = {};
  try { const r = await fetch(`/api/immich/photo/${print.immichId}`); meta = await r.json(); } catch(e) {}

  const sessions = print.sessions || [];
  content.innerHTML = `
    <div class="detail-layout">
      <div class="detail-left">
        <img class="detail-image" src="/api/immich/original/${print.immichId}" alt="${print.title}">
      </div>
      <div class="detail-right">
    <div class="detail-meta">
      <div class="detail-title-row">
        <div class="detail-title" id="title-display">${print.title}</div>
        <button class="btn-icon" onclick="startEditTitle()" title="Edit title">✎</button>
      </div>
      ${meta.description ? `<div class="detail-film">${meta.description}</div>` : ''}
      <div class="exif-row">
        ${meta.shutterSpeed ? `<div class="exif-item">${meta.shutterSpeed}<span>Shutter</span></div>` : ''}
        ${meta.fNumber ? `<div class="exif-item">f/${meta.fNumber}<span>Aperture</span></div>` : ''}
        ${meta.iso ? `<div class="exif-item">ISO ${meta.iso}<span>ISO</span></div>` : ''}
        ${meta.lens ? `<div class="exif-item">${meta.lens}<span>Lens</span></div>` : ''}
      </div>
      <div style="margin-top:0.5rem;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim)">${print.filename}</div>
    </div>
    <div class="sessions-header">
      <div class="sessions-label">Print Sessions (${sessions.length})</div>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-ghost btn-sm" onclick="openAddSessionModal()">+ Session</button>
        <button class="btn btn-danger btn-sm" onclick="deletePrint()">Delete Print</button>
      </div>
    </div>
    ${sessions.length === 0 ? '<div class="loading">No sessions yet.</div>' : ''}
    ${sessions.map(s => {
      const fstop = s.fStop ? (s.fStop.startsWith('f/') ? s.fStop : 'f/' + s.fStop) : '';
      const isSplit = s.technique === 'Split Grade';
      const lowLabel = s.gradeLow || '#00';
      const highLabel = s.gradeHigh || '#5';
      const lowTime = s.gradeOO ? (s.gradeOO.toString().endsWith('s') ? s.gradeOO : s.gradeOO + 's') : '';
      const highTime = s.grade5 ? (s.grade5.toString().endsWith('s') ? s.grade5 : s.grade5 + 's') : '';
      const singleTime = s.time ? (s.time.toString().endsWith('s') ? s.time : s.time + 's') : '';
      const grade = s.grade ? (s.grade.startsWith('#') ? s.grade : '#' + s.grade) : '';
      let exposureLine = '';
      if (isSplit) {
        exposureLine = [fstop, lowLabel + ' → ' + lowTime, highLabel + ' → ' + highTime].filter(Boolean).join('  ·  ');
      } else {
        exposureLine = [fstop, grade, singleTime].filter(Boolean).join('  ·  ');
      }
      return `
      <div class="session-card" id="session-${s.id}">
        <div class="session-header-row">
          <div class="session-date">${s.date}</div>
          <div class="session-size">${s.printSize || ''}</div>
        </div>
        <div class="session-exposure">${exposureLine}</div>
        <div class="session-details">
          ${s.enlarger ? `<span class="session-tag">Enlarger #${s.enlarger}</span>` : ''}
          ${s.lens ? `<span class="session-tag">Lens ${s.lens}</span>` : ''}
          ${s.paper ? `<span class="session-tag">${s.paper}</span>` : ''}
        </div>
        ${s.dodgeBurn ? `<div class="session-notes">${s.dodgeBurn}</div>` : ''}
        ${s.notes ? `<div class="session-notes" style="margin-top:0.5rem;border-color:var(--border);color:var(--text-dim)">${s.notes}</div>` : ''}
        <div class="session-actions">
          <button class="btn btn-ghost btn-sm" onclick="editSession('${s.id}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteSession('${s.id}')">Delete</button>
        </div>
      </div>
    `}).join('')}
      </div>
    </div>
  `;
}

function showGallery() {
  document.getElementById('gallery-view').classList.add('active');
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('add-print-btn').style.display = 'inline-block';
  document.getElementById('header-title').textContent = 'Darkroom Log';
  loadGallery();
}

function startEditTitle() {
  const print = state.prints.find(p => p.id === state.currentPrintId);
  document.querySelector('.detail-title-row').innerHTML = `
    <input class="title-edit-input" id="title-edit-input" type="text" value="${print.title}">
    <button class="btn btn-ghost btn-sm" onclick="saveTitle()">Save</button>
    <button class="btn-icon" onclick="cancelEditTitle('${print.title}')">✕</button>
  `;
  const inp = document.getElementById('title-edit-input');
  inp.focus();
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveTitle(); if (e.key === 'Escape') cancelEditTitle(print.title); });
}

async function saveTitle() {
  const newTitle = document.getElementById('title-edit-input').value.trim();
  if (!newTitle) return;
  await fetch(`/api/prints/${state.currentPrintId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title: newTitle}) });
  const idx = state.prints.findIndex(p => p.id === state.currentPrintId);
  if (idx !== -1) state.prints[idx].title = newTitle;
  document.getElementById('header-title').textContent = newTitle;
  document.querySelector('.detail-title-row').innerHTML = `
    <div class="detail-title" id="title-display">${newTitle}</div>
    <button class="btn-icon" onclick="startEditTitle()" title="Edit title">✎</button>
  `;
}

function cancelEditTitle(original) {
  document.querySelector('.detail-title-row').innerHTML = `
    <div class="detail-title" id="title-display">${original}</div>
    <button class="btn-icon" onclick="startEditTitle()" title="Edit title">✎</button>
  `;
}

function openAddPrintModal() {
  document.getElementById('add-print-modal').classList.add('active');
  document.getElementById('immich-search').value = '';
  document.getElementById('immich-results').innerHTML = '';
  document.getElementById('print-title').value = '';
  state.selectedImmich = null;
}

function openAddSessionModal() {
  state.editingSessionId = null;
  document.getElementById('session-modal-title').textContent = 'Log Print Session';
  clearSessionForm();
  const now = new Date(); const localDate = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0'); document.getElementById('s-date').value = localDate;
  document.getElementById('add-session-modal').classList.add('active');
}

function editSession(sessionId) {
  const print = state.prints.find(p => p.id === state.currentPrintId);
  const s = print.sessions.find(s => s.id === sessionId);
  if (!s) return;
  state.editingSessionId = sessionId;
  document.getElementById('session-modal-title').textContent = 'Edit Session';
  clearSessionForm();
  document.getElementById('s-date').value = s.date || '';
  document.getElementById('s-size').value = s.printSize || '';
  document.getElementById('s-enlarger').value = s.enlarger || '';
  document.getElementById('s-lens').value = s.lens || '';
  const paperSelect = document.getElementById('s-paper'); const knownPapers = ['Fomabrom Variant 111 Glossy','Ilford Multigrade FB Classic Glossy','Ilford Multigrade FB Warmtone Glossy','Ilford Multigrade RC Deluxe']; if (s.paper && knownPapers.includes(s.paper)) { paperSelect.value = s.paper; document.getElementById('s-paper-other').style.display = 'none'; } else if (s.paper) { paperSelect.value = '__other__'; document.getElementById('s-paper-other').value = s.paper; document.getElementById('s-paper-other').style.display = 'block'; } else { paperSelect.value = ''; }
  document.getElementById('s-dodgeburn').value = s.dodgeBurn || '';
  document.getElementById('s-notes').value = s.notes || '';
  if (s.technique === 'Split Grade') {
    setTechnique('split');
    document.getElementById('s-fstop-split').value = s.fStop || '';
    document.getElementById('s-grade-low').value = s.gradeLow || '#00';
    document.getElementById('s-grade-high').value = s.gradeHigh || '#5';
    document.getElementById('s-g00').value = s.gradeOO || '';
    document.getElementById('s-g5').value = s.grade5 || '';
  } else {
    setTechnique('single');
    document.getElementById('s-fstop').value = s.fStop || '';
    document.getElementById('s-grade').value = s.grade || '';
    document.getElementById('s-time').value = s.time || '';
  }
  document.getElementById('add-session-modal').classList.add('active');
}

function clearSessionForm() {
  ['s-date','s-size','s-enlarger','s-lens','s-paper','s-fstop','s-grade','s-time','s-fstop-split','s-grade-low','s-grade-high','s-g00','s-g5','s-dodgeburn','s-notes'].forEach(id => { document.getElementById(id).value = ''; });
  setTechnique('single');
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function setTechnique(t) {
  state.technique = t;
  document.getElementById('t-single').classList.toggle('active', t === 'single');
  document.getElementById('t-split').classList.toggle('active', t === 'split');
  document.getElementById('single-fields').classList.toggle('visible', t === 'single');
  document.getElementById('split-fields').classList.toggle('visible', t === 'split');
}

function searchImmich(q) {
  clearTimeout(state.immichSearchTimeout);
  if (!q || q.length < 2) { document.getElementById('immich-results').innerHTML = ''; return; }
  state.immichSearchTimeout = setTimeout(async () => {
    const r = await fetch(`/api/immich/search?q=${encodeURIComponent(q)}`);
    const items = await r.json();
    const el = document.getElementById('immich-results');
    if (!items.length) { el.innerHTML = '<div class="search-result-item" style="color:var(--text-dim)">No results</div>'; return; }
    el.innerHTML = '<div class="search-results">' + items.map(i => `<div class="search-result-item" onclick='selectImmich(${JSON.stringify(i)})'>${i.filename}</div>`).join('') + '</div>';
  }, 300);
}

function selectImmich(item) {
  state.selectedImmich = item;
  document.getElementById('immich-search').value = item.filename;
  if (!document.getElementById('print-title').value) {
    document.getElementById('print-title').value = item.filename.replace(/\.[^.]+$/, '');
  }
  document.getElementById('immich-results').innerHTML = `<div class="search-result-item selected">${item.filename}</div>`;
}

async function createPrint() {
  if (!state.selectedImmich) { alert('Please select a negative from Immich'); return; }
  const title = document.getElementById('print-title').value.trim();
  if (!title) { alert('Please enter a print title'); return; }
  const r = await fetch('/api/prints', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ immichId: state.selectedImmich.id, filename: state.selectedImmich.filename, title }) });
  const print = await r.json();
  closeModal('add-print-modal');
  await loadGallery();
  showDetail(print.id);
}

function handlePaperChange(el) {
  const other = document.getElementById('s-paper-other');
  other.style.display = el.value === '__other__' ? 'block' : 'none';
  if (el.value === '__other__') other.focus();
}

function getPaperValue() {
  const sel = document.getElementById('s-paper');
  return sel.value === '__other__' ? document.getElementById('s-paper-other').value : sel.value;
}

function autoPrefixHash(el) {
  let v = el.value.replace(/^#+/, '');
  if (v) el.value = '#' + v;
}

function autoPrefixF(el) {
  let v = el.value.replace(/^f\/+/, '');
  if (v) el.value = 'f/' + v;
}

async function saveSession() {
  const isSplit = state.technique === 'split';
  const session = {
    date: document.getElementById('s-date').value,
    printSize: document.getElementById('s-size').value,
    enlarger: document.getElementById('s-enlarger').value,
    lens: document.getElementById('s-lens').value,
    paper: getPaperValue(),
    technique: isSplit ? 'Split Grade' : 'Single Grade',
    fStop: isSplit ? document.getElementById('s-fstop-split').value : document.getElementById('s-fstop').value,
    grade: isSplit ? null : document.getElementById('s-grade').value,
    time: isSplit ? null : document.getElementById('s-time').value,
    gradeLow: isSplit ? document.getElementById('s-grade-low').value : null,
    gradeHigh: isSplit ? document.getElementById('s-grade-high').value : null,
    gradeOO: isSplit ? document.getElementById('s-g00').value : null,
    grade5: isSplit ? document.getElementById('s-g5').value : null,
    dodgeBurn: document.getElementById('s-dodgeburn').value,
    notes: document.getElementById('s-notes').value
  };

  if (state.editingSessionId) {
    const print = state.prints.find(p => p.id === state.currentPrintId);
    const idx = print.sessions.findIndex(s => s.id === state.editingSessionId);
    if (idx !== -1) {
      print.sessions[idx] = { ...print.sessions[idx], ...session };
      await fetch(`/api/prints/${state.currentPrintId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ sessions: print.sessions }) });
    }
  } else {
    await fetch(`/api/prints/${state.currentPrintId}/sessions`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(session) });
  }

  closeModal('add-session-modal');
  await loadGallery();
  showDetail(state.currentPrintId);
}

async function deletePrint() {
  if (!confirm('Delete this print and all its sessions? This cannot be undone.')) return;
  await fetch(`/api/prints/${state.currentPrintId}`, {method:'DELETE'});
  showGallery();
}

async function deleteSession(sessionId) {
  if (!confirm('Delete this session?')) return;
  await fetch(`/api/prints/${state.currentPrintId}/sessions/${sessionId}`, {method:'DELETE'});
  await loadGallery();
  showDetail(state.currentPrintId);
}
</script>
</body>
</html>
