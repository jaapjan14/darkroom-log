<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Album</title>
<!-- PWA / Add to Home Screen support. iOS Safari doesn't allow native
     fullscreen on <div>, but when the user adds the page to their
     home screen the standalone-mode launcher runs without browser
     chrome — effectively fullscreen for the slideshow. -->
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Darkroom Album">
<meta name="theme-color" content="#0a0a0a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#111;--border:#222;--safe:#c8611a;--text:#e8e0d8;--text-dim:#6b6560}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header-left{display:flex;align-items:center;gap:1.25rem}
  .header-brand{display:flex;flex-direction:column;gap:5px;text-decoration:none}
  .header-brand-name{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--safe);line-height:1}
  .header-brand-url{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--text-dim);line-height:1}
  .header-brand:hover .header-brand-url{color:var(--safe)}
  .header-nav{display:flex;gap:.35rem;align-items:center}
  .header-nav-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:.3rem .65rem;transition:border-color .15s,color .15s;white-space:nowrap}
  .header-nav-btn:hover{border-color:var(--safe);color:var(--safe)}
  .header-nav-btn.active{border-color:var(--safe);color:var(--safe)}
  .album-title{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim)}
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);max-width:1200px;margin:0 auto}
  @media(min-width:600px){.photo-grid{grid-template-columns:repeat(5,1fr)}}
  .photo-item{aspect-ratio:1;overflow:hidden;background:var(--surface);cursor:pointer}
  .photo-item img{width:100%;height:100%;object-fit:cover;opacity:.85;transition:opacity .2s}
  .photo-item:hover img{opacity:1}
  .loading{padding:3rem;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim)}
  /* Slideshow */
  .ss-overlay{display:none;position:fixed;inset:0;background:#000;z-index:300;overflow:hidden}
  .ss-overlay.active{display:block}
  .ss-slide{position:absolute;inset:0;overflow:hidden;opacity:0;transition:opacity 1.5s ease-in-out;will-change:opacity}
  .ss-slide.ss-visible{opacity:1}
  /* Beat Fade preset — clean opacity crossfade, no Ken Burns */
  .ss-slide.ss-fade-quick{transition:opacity 1400ms ease-in-out}
  /* Quick preset (slide-horizontal). Only takes effect when JS adds .ss-slide-h. */
  .ss-slide.ss-slide-h{opacity:1;transition:transform 1.8s cubic-bezier(0.4,0,0.2,1);will-change:transform}
  .ss-slide.ss-slide-h.ss-slide-h-from-right{transform:translateX(100%)}
  .ss-slide.ss-slide-h.ss-slide-h-from-left{transform:translateX(-100%)}
  .ss-slide.ss-slide-h.ss-visible{transform:translateX(0)}
  .ss-slide.ss-slide-h.ss-exiting-left{transform:translateX(-100%)}
  .ss-slide.ss-slide-h.ss-exiting-right{transform:translateX(100%)}
  .ss-slide .ss-bg{position:absolute;inset:-20px;background-size:cover;background-position:center;filter:blur(20px) brightness(0.35);transform:scale(1.1)}
  .ss-slide .ss-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;transform-origin:center center;will-change:transform;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
  /* animation applied via inline style in JS so it persists through fade-out */
  @keyframes kenburns{0%{transform:var(--kb-start)}100%{transform:var(--kb-end)}}
  .ss-counter{position:fixed;top:1rem;right:1rem;font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.5);z-index:401;transition:opacity .5s}
  .ss-description{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(255,255,255,.75);text-align:center;max-width:80vw;padding:0 2rem;z-index:401;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ss-photo-title{display:none;opacity:0;position:fixed;bottom:7rem;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:16px;letter-spacing:0.05em;color:rgba(255,255,255,.92);text-align:center;max-width:80vw;padding:0 2rem;z-index:401;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity 2.5s ease-in-out}
  .ss-controls{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);display:flex;gap:.75rem;z-index:401;transition:opacity .5s}
  .ss-hidden{opacity:0;pointer-events:none}
  .ss-title-main{font-family:'IBM Plex Mono',monospace;font-size:64px;letter-spacing:0.25em;text-transform:uppercase;color:#c8611a;font-weight:300;line-height:1.2}
  .ss-title-sub{font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:0.2em;text-transform:uppercase;color:#6b6560;margin-bottom:0.25rem}
  .ss-btn{background:rgba(0,0,0,.6);border:1px solid #333;color:#fff;width:40px;height:40px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .embed-hero{display:none;position:relative;width:100%;height:100vh;overflow:hidden;cursor:pointer;background:#000;-webkit-tap-highlight-color:transparent}
  .embed-hero img{width:100%;height:100%;object-fit:cover;opacity:0.85}
  .embed-hero-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(to bottom,rgba(0,0,0,0.2),rgba(0,0,0,0.5));cursor:pointer;-webkit-tap-highlight-color:transparent}
  .embed-hero-title{font-family:'IBM Plex Mono',monospace;font-size:20px;letter-spacing:0.25em;text-transform:uppercase;color:#fff;font-weight:300;margin-bottom:1.5rem}
  .embed-hero-play{width:56px;height:56px;border:1.5px solid rgba(255,255,255,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;padding-left:4px;transition:all 0.2s}
  .embed-hero:hover .embed-hero-play{border-color:#c8611a;color:#c8611a;transform:scale(1.05)}
  .ss-btn:hover{border-color:var(--safe);color:var(--safe)}
  /* Detail view (tap a thumbnail) — library-style two-column on desktop, stacked on mobile.
     Image is clickable to enter the pure-fullscreen viewer below it in the layer stack. */
  .album-detail-view{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;overflow:hidden}
  .album-detail-view.active{display:flex}
  .album-detail-header{height:52px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;padding:0 1rem;gap:.75rem}
  .album-detail-back{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:14px;cursor:pointer;width:36px;height:32px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
  .album-detail-back:hover{border-color:var(--safe);color:var(--safe)}
  .album-detail-counter{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);flex:1;text-align:center}
  .album-detail-nav{display:flex;gap:.4rem}
  .album-detail-prev,.album-detail-next{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:14px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
  .album-detail-prev:hover,.album-detail-next:hover{border-color:var(--safe);color:var(--safe)}
  .album-detail-layout{flex:1;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
  .album-detail-left{flex-shrink:0;background:#000;display:flex;align-items:center;justify-content:center;cursor:zoom-in;position:relative}
  .album-detail-image{width:100%;height:auto;max-height:70vh;object-fit:contain;display:block;-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
  .album-detail-fs-hint{position:absolute;top:.75rem;right:.75rem;width:32px;height:32px;background:rgba(0,0,0,.55);border:1px solid #333;color:rgba(255,255,255,.75);font-size:14px;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .album-detail-right{flex-shrink:0;padding:1rem 1.25rem 2.5rem;background:var(--bg)}
  .album-detail-title{font-family:'IBM Plex Sans',sans-serif;font-size:20px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:.5rem}
  .album-detail-title:empty{display:none}
  .album-detail-desc{font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-style:italic;color:var(--text);line-height:1.5;margin-bottom:1rem}
  .album-detail-desc:empty{display:none}
  .album-exif-table{margin-top:.75rem}
  .album-exif-row{display:flex;align-items:flex-start;padding:.5rem 0;border-bottom:1px solid var(--border);gap:1rem}
  .album-exif-row:last-child{border-bottom:none}
  .album-exif-icon{color:var(--text-dim);font-size:14px;width:20px;flex-shrink:0;padding-top:2px}
  .album-exif-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);width:90px;flex-shrink:0;padding-top:2px}
  .album-exif-value{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--text);flex:1;line-height:1.4}
  .album-exif-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:3px}
  @media(min-width:768px){
    .album-detail-layout{flex-direction:row;overflow:hidden}
    .album-detail-left{flex:3;height:100%;overflow:hidden;min-width:0}
    .album-detail-image{max-width:100%;max-height:100%;width:auto;height:auto}
    .album-detail-right{flex:2;overflow-y:auto;border-left:1px solid var(--border);max-width:480px;padding-bottom:2rem}
  }
  /* Pure fullscreen viewer — opened by tapping the photo in detail view. No metadata,
     no counter, just the image with pinch-zoom. */
  .album-fs-overlay{display:none;position:fixed;inset:0;background:#000;z-index:350;align-items:center;justify-content:center}
  .album-fs-overlay.active{display:flex}
  /* will-change/transform-origin intentionally NOT in CSS — zoom.js manages
     them dynamically: applied only during active gestures, cleared after idle.
     A static will-change:transform locks Safari into compositing the <img>
     at its layout size and never re-rasterizes from the source bitmap, so the
     high-res original looks no sharper than the display size when zoomed. */
  .album-fs-overlay img{max-width:100%;max-height:100%;object-fit:contain;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
  .album-fs-close{position:fixed;top:1rem;right:1rem;width:40px;height:40px;background:rgba(0,0,0,.55);border:1px solid #333;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:401}
  .album-fs-close:hover{border-color:var(--safe);color:var(--safe)}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <a class="header-brand" href="https://lakatua.me" target="_blank" rel="noopener">
      <span class="header-brand-name">Jacob Lakatua Photography</span>
      <span class="header-brand-url">lakatua.me ↗</span>
    </a>
    <div class="header-nav">
      <button class="header-nav-btn" id="btn-slideshow">▶ Slideshow</button>
    </div>
  </div>
  <div class="album-title" id="album-name"></div>
</div>
<div class="embed-hero" id="embed-hero">
  <img id="embed-hero-img" src="" alt="">
  <button class="embed-hero-overlay" data-action="startSlideshow" style="border:none;background:none;width:100%;padding:0">
    <div class="embed-hero-title" id="embed-hero-title"></div>
    <div class="embed-hero-play">▶</div>
  </div>
</div>
<div class="photo-grid" id="photo-grid">
  <div class="loading" style="grid-column:1/-1">Loading...</div>
</div>

<div id="ss-title-card" style="display:none;position:fixed;inset:0;background:#0a0a0a;z-index:320;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 1s ease-in-out;pointer-events:none">
  <div id="ss-title-card-content" style="text-align:center;padding:2rem;max-width:700px"></div>
</div>

<div class="ss-overlay" id="ss-overlay">
  <div id="ss-slide-a" class="ss-slide"><div class="ss-bg" id="ss-bg-a"></div><img class="ss-img" id="ss-img-a"></div>
  <div id="ss-slide-b" class="ss-slide"><div class="ss-bg" id="ss-bg-b"></div><img class="ss-img" id="ss-img-b"></div>
  <div class="ss-counter" id="ss-counter"></div>
  <div class="ss-photo-title" id="ss-photo-title"></div>
  <div class="ss-description" id="ss-description"></div>
  <div class="ss-controls" id="ss-controls">
    <button class="ss-btn" id="btn-ss-prev">‹</button>
    <button class="ss-btn" id="ss-pause" >❚❚</button>
    <button class="ss-btn" id="ss-desc-btn"  title="Toggle description">✦</button>
    <button class="ss-btn" id="ss-music-btn"  title="Toggle music">♪</button>
    <button class="ss-btn" id="btn-ss-next">›</button>
    <button class="ss-btn"  id="ss-fs-btn" title="Fullscreen">⤢</button>
    <button class="ss-btn" id="btn-ss-close">✕</button>
  </div>
</div>

<div class="album-detail-view" id="album-detail-view">
  <div class="album-detail-header">
    <button class="album-detail-back" id="album-detail-back" title="Back to grid">‹</button>
    <div class="album-detail-counter" id="album-detail-counter"></div>
    <div class="album-detail-nav">
      <button class="album-detail-prev" id="album-detail-prev" title="Previous">‹</button>
      <button class="album-detail-next" id="album-detail-next" title="Next">›</button>
    </div>
  </div>
  <div class="album-detail-layout">
    <div class="album-detail-left" id="album-detail-left">
      <img class="album-detail-image" id="album-detail-image" src="" alt="">
      <div class="album-detail-fs-hint">⤢</div>
    </div>
    <div class="album-detail-right">
      <div class="album-detail-title" id="album-detail-title"></div>
      <div class="album-detail-desc" id="album-detail-desc"></div>
      <div class="album-exif-table" id="album-exif-table"></div>
    </div>
  </div>
</div>
<div class="album-fs-overlay" id="album-fs-overlay">
  <img id="album-fs-img" src="" alt="">
  <button class="album-fs-close" id="album-fs-close" title="Close">✕</button>
</div>
<script src="/zoom.js?v=2"></script>
<script src="/audio-engine.js?v=9"></script>
<script src="/album.js?v=60"></script>
</body>
</html>
